naftiko: 1.0.0-alpha2
info:
  label: Shopify Admin REST API — Shop
  description: 'Shopify Admin REST API — Shop. 1 operations. Lead operation: Get Shop. Self-contained Naftiko capability covering
    one Shopify Admin business surface.'
  tags:
  - Shopify Admin
  - Shop
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHOPIFY_ADMIN_API_KEY: SHOPIFY_ADMIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-shop
    baseUri: https://{store_name}.myshopify.com/admin/api/2024-10
    description: Shopify Admin REST API — Shop business capability. Self-contained, no shared references.
    resources:
    - name: shop.json
      path: /shop.json
      operations:
      - name: getshop
        method: GET
        description: Get Shop
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Shopify-Access-Token
      value: '{{env.SHOPIFY_ADMIN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-shop-rest
    port: 8080
    description: REST adapter for Shopify Admin REST API — Shop. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/shop-json
      name: shop-json
      description: REST surface for shop.json.
      operations:
      - method: GET
        name: getshop
        description: Get Shop
        call: rest-shop.getshop
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-shop-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shopify Admin REST API — Shop. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-shop
      description: Get Shop
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-shop.getshop
      outputParameters:
      - type: object
        mapping: $.
