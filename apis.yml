apis:
- aid: shopify-admin:shopify-admin-rest-api
  name: Shopify Admin REST API
  description: 'The Shopify Admin REST API lets you build apps and integrations that extend and enhance the Shopify admin.
    It provides access to products, customers, orders, inventory, fulfillment, shipping, and store configuration. All requests
    require a valid Shopify access token generated through OAuth. Note: Shopify is deprecating the REST Admin API in favor
    of GraphQL; new development should use the GraphQL Admin API.'
  humanURL: https://shopify.dev/docs/api/admin-rest
  baseURL: https://{store_name}.myshopify.com/admin/api/2024-10
