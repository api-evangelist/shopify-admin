- aid: shopify-admin:shopify-webhooks
  name: Shopify Webhooks
  description: Shopify webhooks allow apps to subscribe to specific events that occur in a store. When an event occurs, Shopify
    sends an HTTP POST request with a JSON payload to the configured endpoint. Webhooks can be configured for events across
    all major Shopify resources including orders, products, customers, inventory, fulfillment, and app-specific events.
  humanURL: https://shopify.dev/docs/api/webhooks
