- aid: shopify-admin:shopify-admin-graphql-api
  name: Shopify Admin GraphQL API
  description: The Shopify Admin GraphQL API is the recommended API for building Shopify apps and integrations. It provides
    access to all Shopify admin resources including products, customers, orders, inventory, fulfillment, and analytics. GraphQL
    enables efficient data fetching with precise field selection, real-time subscriptions, and access to advanced platform
    features not available in REST.
  humanURL: https://shopify.dev/docs/api/admin-graphql
  baseURL: https://{store_name}.myshopify.com/admin/api/2024-10/graphql.json
