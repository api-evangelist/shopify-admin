aid: shopify-admin
name: Shopify Admin API
description: The Shopify Admin API provides programmatic access to manage Shopify store administration. It enables app developers
  and merchants to manage products, customers, orders, inventory, shipping, fulfillment, collections, webhooks, and store
  settings. The Admin API is available in both REST and GraphQL formats. Shopify is transitioning from REST to GraphQL as
  the primary API, with GraphQL recommended for all new development.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Commerce
- Ecommerce
- Admin
- Products
- Orders
- Customers
url: https://raw.githubusercontent.com/api-evangelist/shopify-admin/refs/heads/main/apis.yml
created: '2026-05-02'
modified: '2026-05-19'
