  - name: themes
    description: Theme lifecycle and publishing events.
  - name: subscriptions
    description: Subscription contract, billing attempt, and billing cycle events.
  - name: b2b
    description: Companies, contacts, and B2B-specific events.
  - name: compliance
    description: GDPR compliance and audit topics that are mandatory for App Store apps.
