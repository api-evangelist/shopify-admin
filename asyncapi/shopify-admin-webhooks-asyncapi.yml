components:
  messages:
    ShopifyWebhook:
      name: ShopifyWebhook
      title: Shopify Webhook Delivery
      summary: A signed Shopify webhook HTTP POST delivery.
      description: |
        Shopify delivers a JSON payload via HTTP POST to the registered endpoint.
        The payload shape depends on the topic and follows the schema of the
        underlying Admin API resource (for example, an `orders/create` payload
        matches the Order resource shape from the Admin API).
      contentType: application/json
      headers:
        $ref: '#/components/schemas/WebhookHeaders'
      payload:
        $ref: '#/components/schemas/WebhookPayload'
      bindings:
        http:
          type: request
          method: POST
          bindingVersion: 0.3.0
      examples:
        - name: ordersCreateExample
          summary: An orders/create delivery
          headers:
            X-Shopify-Topic: orders/create
            X-Shopify-Shop-Domain: example.myshopify.com
            X-Shopify-API-Version: '2024-10'
            X-Shopify-Webhook-Id: b54557e4-bcc6-4f9a-b4dc-2b6f8b1c9b8e
            X-Shopify-Hmac-Sha256: 'aGVsbG8td29ybGQtaG1hYy1zaWduYXR1cmU='
          payload:
            id: 820982911946154508
            admin_graphql_api_id: gid://shopify/Order/820982911946154508
            name: '#1001'
            email: customer@example.com
            financial_status: paid
            fulfillment_status: null
            currency: USD
            total_price: '199.99'
  schemas:
    WebhookHeaders:
      type: object
      required:
        - X-Shopify-Topic
        - X-Shopify-Shop-Domain
        - X-Shopify-Hmac-Sha256
        - X-Shopify-API-Version
        - X-Shopify-Webhook-Id
      properties:
        X-Shopify-Topic:
          type: string
          description: |
            The webhook topic. Identifies which event triggered the delivery
            (for example, `orders/create`, `products/update`).
          example: orders/create
        X-Shopify-Shop-Domain:
          type: string
          format: hostname
          description: The `*.myshopify.com` domain of the shop that triggered the event.
          example: example.myshopify.com
        X-Shopify-Hmac-Sha256:
          type: string
          description: |
            Base64-encoded HMAC-SHA256 signature of the raw, unmodified request
            body. The HMAC key is the app's client secret (for app-scoped
            webhooks registered via `shopify.app.toml` or partners dashboard)
            or the app's API secret key (for webhooks created via the REST or
            GraphQL Admin API on a per-shop basis).

            Receivers MUST verify this header before processing the payload by
            recomputing the HMAC over the raw body and comparing in
            constant time.
          example: aGVsbG8td29ybGQtaG1hYy1zaWduYXR1cmU=
        X-Shopify-API-Version:
          type: string
          description: The Admin API version used to format the payload.
          example: '2024-10'
        X-Shopify-Webhook-Id:
          type: string
          format: uuid
          description: |
            A unique identifier for the webhook delivery. Useful for
            idempotency and deduplication: Shopify may retry the same event
            up to 19 times over 48 hours, all sharing this identifier.
          example: b54557e4-bcc6-4f9a-b4dc-2b6f8b1c9b8e
        X-Shopify-Triggered-At:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp indicating when the event was triggered inside
            Shopify (present on most topics).
          example: '2024-10-29T10:15:30Z'
    WebhookPayload:
      type: object
      description: |
        Topic-specific JSON payload. The shape varies per topic and mirrors
        the corresponding Admin API resource representation. Refer to the
        Shopify webhook reference for the per-topic payload schema:
        https://shopify.dev/docs/api/webhooks/2024-10.
      additionalProperties: true
  securitySchemes:
    hmacSha256Signature:
      type: symmetricEncryption
      description: |
        Shopify signs every webhook delivery with an HMAC-SHA256 signature
        computed over the raw request body, using the app's client secret (or
        per-shop API secret key) as the key. The base64-encoded signature is
        transmitted in the `X-Shopify-Hmac-Sha256` header.

        Receivers MUST:
          1. Read the raw, unparsed request body.
          2. Compute `base64(HMAC_SHA256(client_secret, raw_body))`.
          3. Constant-time compare the result to the `X-Shopify-Hmac-Sha256`
             header value.
          4. Reject the request with HTTP 401 if the signatures do not match.

        Reference: https://shopify.dev/docs/apps/build/webhooks/subscribe/https#step-3-verify-the-webhook
