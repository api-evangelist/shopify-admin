specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Shopify Admin API
providerId: shopify-admin
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - Ecommerce
  - Admin
  - Products
  - Orders
  - Customers
  - Rate Limiting
description: Shopify Admin API uses a calculated query cost (points-based) model for GraphQL. Per-second
  budgets vary by the store's commerce plan. A single GraphQL query may not exceed 1,000 points regardless
  of plan. REST endpoints share the underlying bucket on store-scoped traffic. Customer Account API
  shares a similar points scheme with its own ceilings.
sources:
  - https://shopify.dev/docs/api/usage/rate-limits
responseCodes:
  throttled: 429
  graphqlThrottled: 200
limits:
  - name: GraphQL Admin API (Standard, Basic/Grow plans)
    scope: shop
    metric: points_per_second
    limit: 100
    timeFrame: second
    notes: Calculated query cost model; query cost returned in extensions.cost.
  - name: GraphQL Admin API (Advanced Shopify)
    scope: shop
    metric: points_per_second
    limit: 200
    timeFrame: second
  - name: GraphQL Admin API (Shopify Plus)
    scope: shop
    metric: points_per_second
    limit: 1000
    timeFrame: second
  - name: GraphQL Admin API (Enterprise)
    scope: shop
    metric: points_per_second
    limit: 2000
    timeFrame: second
  - name: GraphQL Admin API single-query maximum cost
    scope: query
    metric: points_per_query
    limit: 1000
    notes: A single query may not exceed 1,000 points regardless of plan limits.
  - name: Payments Apps API (Standard)
    scope: shop
    metric: points_per_second
    limit: 27300
    timeFrame: second
  - name: Payments Apps API (Shopify Plus)
    scope: shop
    metric: points_per_second
    limit: 54600
    timeFrame: second
  - name: Payments Apps API (Enterprise)
    scope: shop
    metric: points_per_second
    limit: 109200
    timeFrame: second
  - name: Customer Account API (Standard)
    scope: shop
    metric: points_per_second
    limit: 100
    timeFrame: second
  - name: Customer Account API (Advanced Shopify)
    scope: shop
    metric: points_per_second
    limit: 200
    timeFrame: second
  - name: Customer Account API (Enterprise)
    scope: shop
    metric: points_per_second
    limit: 400
    timeFrame: second
  - name: Input array size
    scope: query
    metric: array_size
    limit: 250
    notes: Input arguments that accept an array have a maximum size of 250.
  - name: Pagination ceiling
    scope: query
    metric: objects
    limit: 25000
    notes: Pagination is limited to 25,000 objects; deeper pagination is resource-intensive.
policies:
  - name: Calculated Query Cost
    description: GraphQL APIs return requestedQueryCost, actualQueryCost, and throttle status in the
      extensions key. Clients should read this and slow down before hitting the bucket ceiling.
  - name: Leaky Bucket
    description: Shopify uses a leaky bucket algorithm; capacity refills at the per-second leak rate.
      Sustained requests above the leak rate will throttle.
  - name: Throttled Status
    description: Throttled GraphQL responses return 200 with a THROTTLED error code; REST responses
      return 429. Clients should retry after the bucket refills.
  - name: Plan-Based Limits
    description: Limits scale with the merchant's commerce plan (Basic/Grow, Advanced, Plus, Enterprise).
      Upgrade the plan to raise limits.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
