specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Shopify Admin API
providerId: shopify-admin
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - Ecommerce
  - Admin
  - Products
  - Orders
  - Customers
description: Shopify Admin API access is included with the merchant's commerce subscription. There is
  no separate API SKU; API rate-limit headroom is determined by the store's commerce plan (Basic, Grow,
  Advanced, Plus, Enterprise). Plus and Enterprise unlock higher GraphQL points-per-second budgets.
sources:
  - https://www.shopify.com/pricing
  - https://shopify.dev/docs/api/usage/rate-limits
plans:
  - id: shopify-admin-basic
    name: Basic
    type: subscription
    description: Entry commerce plan; Admin API access at standard GraphQL cost limits.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$29/month (billed yearly)'
        userMultiplied: false
      - label: Online card rate
        name: card_online
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '2.9% + 30¢'
        userMultiplied: false
      - label: In-person card rate
        name: card_in_person
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '2.6% + 10¢'
        userMultiplied: false
      - label: Third-party payment provider fee
        name: third_party_payment_fee
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '2%'
        userMultiplied: false
    elements:
      - name: Shopify Admin REST API
      - name: Shopify Admin GraphQL API
